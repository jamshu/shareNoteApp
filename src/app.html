<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0f766e" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<title>ShareNote</title>
		<script>
			// Apply cached theme before first paint to avoid a flash. New users
			// (no cached theme) get the default palette; keep this id in sync with
			// DEFAULT_THEME in src/lib/themes.js.
			try {
				var t = localStorage.getItem('theme');
				document.documentElement.dataset.theme = t && /^[a-z-]+$/.test(t) ? t : 'catppuccin-latte';
			} catch (e) {
				document.documentElement.dataset.theme = 'catppuccin-latte';
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
